name: Release

# Fires on a version tag (v0.1.0, v0.2.3, ...). Tag the commit you want to ship:
#   git tag v0.1.0 && git push --tags
# The tag version must match package.json's "version" or npm publish will fail.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm

    permissions:
      contents: write   # needed by softprops/action-gh-release to create the release
      id-token: write   # for npm Trusted Publishing (OIDC) + provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Prerelease versions (0.4.0-beta.1, 1.0.0-rc.2, ...) publish under the
      # `beta` dist-tag so `npm install <pkg>` still serves the last stable.
      - name: Determine dist-tag
        id: distTag
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if [[ "$version" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # `n8n-node release` in CI mode (GITHUB_ACTIONS=true is set automatically)
      # runs lint + build + `npm publish` with NPM_CONFIG_PROVENANCE=true. We pass
      # NPM_CONFIG_TAG via env so prereleases don't overwrite the `latest` dist-tag.
      - name: Release via n8n-node CLI
        env:
          NPM_CONFIG_TAG: ${{ steps.distTag.outputs.tag }}
        run: npm run release

      # Produces the .tgz on disk so the GitHub Release step can attach it.
      - name: Pack tarball
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.distTag.outputs.prerelease == 'true' }}
          files: |
            *.tgz
